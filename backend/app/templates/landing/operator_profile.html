{% extends "base.html" %}
{% block title %}Mi Perfil - Operador{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">
  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-2xl font-bold" style="color:#5d4224;">Mi Perfil</h1>
      <p class="text-gray-500 text-sm" id="user-email"></p>
    </div>
    <button onclick="logout()" class="text-sm px-4 py-2 rounded-lg border border-gray-300 hover:bg-gray-100 transition">Cerrar Sesión</button>
  </div>

  <div id="not-logged" class="hidden text-center py-12">
    <p class="text-gray-500 mb-4">Debes iniciar sesión para ver tu perfil</p>
    <a href="/enrolamiento/login" class="inline-block px-6 py-2 rounded-lg font-semibold text-white" style="background:#cf9b62; color:#1a1a1a;">Iniciar Sesión</a>
  </div>

  <form id="profile-form" class="hidden space-y-6">
    <!-- Datos Personales -->
    <div class="bg-white rounded-xl shadow p-6 space-y-4">
      <h2 class="font-semibold text-gray-700 border-b pb-2">📋 Datos Personales</h2>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombres</label>
          <input type="text" id="first_name" class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-50" readonly>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Apellidos</label>
          <input type="text" id="last_name" class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-50" readonly>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Tipo Doc</label>
          <input type="text" id="document_type" class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-50" readonly>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Número Doc</label>
          <input type="text" id="document_number" class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-50" readonly>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
        <input type="tel" id="phone" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
      </div>
    </div>

    <!-- Datos Laborales -->
    <div class="bg-white rounded-xl shadow p-6 space-y-4">
      <h2 class="font-semibold text-gray-700 border-b pb-2">👷 Datos Laborales</h2>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">EPS</label>
          <select id="eps_id" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
            <option value="">— Seleccionar —</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">ARL</label>
          <select id="arl_id" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
            <option value="">— Seleccionar —</option>
          </select>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Ciudad</label>
          <input type="text" id="city" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Dirección</label>
          <input type="text" id="address" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Localidad / Barrio</label>
          <input type="text" id="locality" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">WhatsApp</label>
          <input type="tel" id="whatsapp" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Tipo de Sangre</label>
        <select id="blood_type" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
          <option value="">—</option>
          <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
          <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
        </select>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Contacto Emergencia</label>
          <input type="text" id="emergency_contact_name" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Tel. Emergencia</label>
          <input type="tel" id="emergency_contact_phone" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
        </div>
      </div>
    </div>

    <!-- Experiencia -->
    <div class="bg-white rounded-xl shadow p-6 space-y-4">
      <h2 class="font-semibold text-gray-700 border-b pb-2">🎯 Experiencia</h2>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Experiencia en eventos?</label>
        <select id="has_protocol_experience" onchange="toggleExp(this.value)" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
          <option value="">—</option>
          <option value="true">Sí</option>
          <option value="false">No</option>
        </select>
      </div>
      <div id="exp-section" class="hidden space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Cargos con experiencia</label>
          <div id="roles-container" class="grid grid-cols-1 sm:grid-cols-2 gap-2"></div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Tamaño Evento</label>
          <select id="event_size_experience" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
            <option value="">—</option>
            <option value="100">Hasta 100</option>
            <option value="500">100-500</option>
            <option value="1000">500-1000</option>
            <option value="2000">1000-2000</option>
            <option value="2000+">Más de 2000</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Tallas -->
    <div class="bg-white rounded-xl shadow p-6 space-y-4">
      <h2 class="font-semibold text-gray-700 border-b pb-2">👕 Tallas</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Zapatos</label>
          <input type="text" id="shoe_size" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Camisa</label>
          <select id="shirt_size" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
            <option value="">—</option><option>XS</option><option>S</option><option>M</option><option>L</option><option>XL</option><option>XXL</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Pantalón</label>
          <input type="text" id="pants_size" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Chaqueta</label>
          <select id="jacket_size" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
            <option value="">—</option><option>XS</option><option>S</option><option>M</option><option>L</option><option>XL</option><option>XXL</option>
          </select>
        </div>
      </div>
    </div>

    <div id="msg" class="hidden text-sm p-3 rounded-lg"></div>

    <button type="button" onclick="saveProfile()" id="save-btn"
      class="w-full py-3 rounded-lg font-bold transition" style="background:#cf9b62; color:#1a1a1a;">
      Guardar Cambios
    </button>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
const API = '/api/operators/me/profile';
let token = localStorage.getItem('access_token');

function authHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
}

function logout() {
  localStorage.removeItem('access_token');
  localStorage.removeItem('user');
  window.location.href = '/enrolamiento/login';
}

function toggleExp(v) {
  document.getElementById('exp-section').classList.toggle('hidden', v !== 'true');
}

function showMsg(text, ok) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = `text-sm p-3 rounded-lg ${ok ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'}`;
  setTimeout(() => el.classList.add('hidden'), 4000);
}

async function loadProfile() {
  if (!token) { document.getElementById('not-logged').classList.remove('hidden'); return; }
  try {
    const resp = await fetch(API, { headers: authHeaders() });
    if (!resp.ok) { logout(); return; }
    const data = await resp.json();
    document.getElementById('profile-form').classList.remove('hidden');
    document.getElementById('user-email').textContent = data.email;

    // Fill fields
    const f = data.user || {};
    document.getElementById('first_name').value = f.first_name || '';
    document.getElementById('last_name').value = f.last_name || '';
    document.getElementById('document_type').value = f.document_type || '';
    document.getElementById('document_number').value = f.document_number || '';
    document.getElementById('phone').value = f.phone || '';

    const o = data.operator || {};
    document.getElementById('city').value = o.city || '';
    document.getElementById('address').value = o.address || '';
    document.getElementById('locality').value = o.locality || '';
    document.getElementById('whatsapp').value = o.whatsapp || '';
    document.getElementById('blood_type').value = o.blood_type || '';
    document.getElementById('emergency_contact_name').value = o.emergency_contact_name || '';
    document.getElementById('emergency_contact_phone').value = o.emergency_contact_phone || '';
    document.getElementById('shoe_size').value = o.shoe_size || '';
    document.getElementById('shirt_size').value = o.shirt_size || '';
    document.getElementById('pants_size').value = o.pants_size || '';
    document.getElementById('jacket_size').value = o.jacket_size || '';
    document.getElementById('event_size_experience').value = o.event_size_experience || '';

    if (o.has_protocol_experience !== null && o.has_protocol_experience !== undefined) {
      document.getElementById('has_protocol_experience').value = String(o.has_protocol_experience);
      toggleExp(String(o.has_protocol_experience));
    }

    // Load catalogs + set current values
    const [epsResp, arlResp, rolesResp] = await Promise.all([
      fetch('/api/catalogs/eps'), fetch('/api/catalogs/arl'), fetch('/api/catalogs/roles')
    ]);
    if (epsResp.ok) {
      const eps = await epsResp.json();
      const sel = document.getElementById('eps_id');
      eps.forEach(e => { const op = document.createElement('option'); op.value=e.id; op.text=e.name; sel.add(op); });
      if (o.eps_id) sel.value = o.eps_id;
    }
    if (arlResp.ok) {
      const arl = await arlResp.json();
      const sel = document.getElementById('arl_id');
      arl.forEach(a => { const op = document.createElement('option'); op.value=a.id; op.text=a.name; sel.add(op); });
      if (o.arl_id) sel.value = o.arl_id;
    }
    if (rolesResp.ok) {
      const roles = await rolesResp.json();
      const savedRoles = o.experience_roles ? JSON.parse(o.experience_roles) : [];
      const container = document.getElementById('roles-container');
      roles.forEach(r => {
        const label = document.createElement('label');
        label.className = 'flex items-center gap-2 p-2 rounded-lg border border-gray-200 hover:bg-gray-50 cursor-pointer text-sm';
        const checked = savedRoles.includes(r.id) ? 'checked' : '';
        label.innerHTML = `<input type="checkbox" name="experience_roles" value="${r.id}" ${checked} class="rounded"> ${r.name}`;
        container.appendChild(label);
      });
    }
  } catch(e) { console.error(e); showMsg('Error cargando perfil', false); }
}

async function saveProfile() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Guardando...';

  const selectedRoles = Array.from(document.querySelectorAll('input[name="experience_roles"]:checked')).map(cb => cb.value);
  const data = {
    phone: document.getElementById('phone').value || undefined,
    eps_id: document.getElementById('eps_id').value || undefined,
    arl_id: document.getElementById('arl_id').value || undefined,
    city: document.getElementById('city').value || undefined,
    address: document.getElementById('address').value || undefined,
    locality: document.getElementById('locality').value || undefined,
    whatsapp: document.getElementById('whatsapp').value || undefined,
    blood_type: document.getElementById('blood_type').value || undefined,
    emergency_contact_name: document.getElementById('emergency_contact_name').value || undefined,
    emergency_contact_phone: document.getElementById('emergency_contact_phone').value || undefined,
    has_protocol_experience: document.getElementById('has_protocol_experience').value || undefined,
    event_size_experience: document.getElementById('event_size_experience').value || undefined,
    shoe_size: document.getElementById('shoe_size').value || undefined,
    shirt_size: document.getElementById('shirt_size').value || undefined,
    pants_size: document.getElementById('pants_size').value || undefined,
    jacket_size: document.getElementById('jacket_size').value || undefined,
    experience_roles: selectedRoles.length > 0 ? selectedRoles : undefined,
  };

  try {
    const resp = await fetch(API, { method:'PUT', headers:authHeaders(), body:JSON.stringify(data) });
    if (resp.ok) { showMsg('Perfil actualizado correctamente', true); }
    else { const err = await resp.json(); showMsg(err.detail || 'Error al guardar', false); }
  } catch(e) { showMsg('Error de conexión', false); }
  finally { btn.disabled=false; btn.textContent='Guardar Cambios'; }
}

loadProfile();
</script>
{% endblock %}
