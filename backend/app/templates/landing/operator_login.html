{% extends "base.html" %}
{% block title %}Iniciar Sesión - Operadores{% endblock %}
{% block content %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4">
  <div class="max-w-md w-full">
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold" style="color:#5d4224;">Iniciar Sesión</h1>
      <p class="text-gray-500 mt-1">Accede a tu perfil de operador</p>
    </div>

    <form id="login-form" class="bg-white rounded-xl shadow-lg p-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Número de Documento</label>
        <input type="text" id="document_number" required placeholder="Ej: 1234567890"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
        <input type="password" id="password" required minlength="8" placeholder="Tu contraseña"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
      </div>

      <div id="error-msg" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-lg"></div>

      <button type="button" onclick="login()" id="login-btn"
        class="w-full py-3 rounded-lg font-bold text-white transition" style="background:#cf9b62; color:#1a1a1a;">
        <span id="btn-text">Iniciar Sesión</span>
        <span id="btn-spinner" class="hidden">
          <svg class="animate-spin inline h-5 w-5" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
        </span>
      </button>

      <p class="text-center text-sm text-gray-500">
        ¿No tienes cuenta? <a href="/enrolamiento" class="font-semibold" style="color:#cf9b62;">Regístrate aquí</a>
      </p>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function login() {
  const btn = document.getElementById('login-btn');
  const text = document.getElementById('btn-text');
  const spinner = document.getElementById('btn-spinner');
  const errEl = document.getElementById('error-msg');
  errEl.classList.add('hidden');

  const document_number = document.getElementById('document_number').value;
  const password = document.getElementById('password').value;
  if (!document_number || !password) { errEl.textContent='Completa todos los campos'; errEl.classList.remove('hidden'); return; }

  btn.disabled=true; text.classList.add('hidden'); spinner.classList.remove('hidden');
  try {
    const resp = await fetch('/api/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({document_number, password})
    });
    if (resp.ok) {
      const data = await resp.json();
      localStorage.setItem('access_token', data.access_token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = '/enrolamiento/perfil';
    } else {
      const err = await resp.json();
      errEl.textContent = err.detail || 'Error al iniciar sesión';
      errEl.classList.remove('hidden');
    }
  } catch(e) {
    errEl.textContent = 'Error de conexión';
    errEl.classList.remove('hidden');
  } finally {
    btn.disabled=false; text.classList.remove('hidden'); spinner.classList.add('hidden');
  }
}
</script>
{% endblock %}
