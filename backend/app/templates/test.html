{% extends "base.html" %}

{% block title %}Test UI - Logística{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto mt-10 p-6">
    <div class="bg-white rounded-xl shadow-lg p-8 text-center">
        <h1 class="text-3xl font-bold text-primary-800 mb-4">Frontend base funcionando ✅</h1>
        <p class="text-gray-600 mb-6">Tailwind CSS + HTMX configurados correctamente.</p>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6">
            <div class="bg-primary-50 rounded-lg p-4">
                <h3 class="font-semibold text-primary-800">Tailwind CSS</h3>
                <p class="text-sm text-gray-600">Estilos aplicados</p>
            </div>
            <div class="bg-green-50 rounded-lg p-4">
                <h3 class="font-semibold text-green-800">HTMX</h3>
                <p class="text-sm text-gray-600">Interactividad lista</p>
            </div>
            <div class="bg-blue-50 rounded-lg p-4">
                <h3 class="font-semibold text-blue-800">Jinja2</h3>
                <p class="text-sm text-gray-600">Templates activos</p>
            </div>
        </div>

        <!-- HTMX test -->
        <div class="mt-8">
            <button hx-get="/health" hx-target="#htmx-result" hx-swap="innerHTML"
                    class="bg-primary-600 hover:bg-primary-700 text-white font-bold py-2 px-6 rounded-lg transition">
                Probar HTMX → /health
            </button>
            <div id="htmx-result" class="mt-4 text-gray-700"></div>
        </div>
    </div>
</div>
{% endblock %}
