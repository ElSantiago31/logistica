<script>
(function(){
    var u=JSON.parse(localStorage.getItem('user')||'{}');
    var el=document.getElementById('userName');if(el)el.textContent=u.first_name+' '+u.last_name;
    if(u.user_type==='superadmin'){
        var s=document.getElementById('superadminLink');if(s)s.classList.remove('hidden');
        var sm=document.getElementById('superadminLinkM');if(sm)sm.classList.remove('hidden');
    }
    // Highlight active mobile menu item based on current URL
    var path=window.location.pathname;
    var map={'/admin':'dashboard','/admin/':'dashboard','/admin/operators':'operators','/admin/events':'events','/admin/superadmin':'superadmin'};
    var active=map[path];
    if(!active){
        if(path.indexOf('/admin/operator')===0)active='operators';
        else if(path.indexOf('/admin/event')===0)active='events';
        else active='dashboard';
    }
    document.querySelectorAll('[data-nav]').forEach(function(a){
        if(a.getAttribute('data-nav')===active){
            if(a.classList.contains('desktop-nav')){
                a.style.borderBottom='2px solid #cf9b62';
            } else {
                a.classList.add('bg-white/10','font-semibold');
            }
            a.style.color='#fff2e4';
        }
    });
})();
function adminLogout(){localStorage.clear();location.href='/admin/login'}

// --- Dark/Light theme toggle ---
(function(){
  var saved=localStorage.getItem('admin-theme');
  if(saved==='dark') document.documentElement.setAttribute('data-theme','dark');
  else document.documentElement.removeAttribute('data-theme');
  updateThemeIcon();
})();
function toggleAdminTheme(){
  var isDark=document.documentElement.getAttribute('data-theme')==='dark';
  if(isDark){ document.documentElement.removeAttribute('data-theme'); localStorage.setItem('admin-theme','light'); }
  else { document.documentElement.setAttribute('data-theme','dark'); localStorage.setItem('admin-theme','dark'); }
  updateThemeIcon();
}
function updateThemeIcon(){
  var isDark=document.documentElement.getAttribute('data-theme')==='dark';
  var moon=document.getElementById('theme-icon-moon');
  var sun=document.getElementById('theme-icon-sun');
  if(moon) moon.classList.toggle('hidden',!isDark);
  if(sun) sun.classList.toggle('hidden',isDark);
}
</script>
