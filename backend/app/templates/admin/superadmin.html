<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/jpeg" href="/static/frontend/logo.jpeg">
    <link rel="apple-touch-icon" href="/static/frontend/logo.jpeg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superadmin - Gestión de Admins</title>
    <link rel="stylesheet" href="/static/frontend/tailwind.css?v=20260718">
<style>.toast{animation:slideIn .3s ease-out}@keyframes slideIn{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}</style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>
{% include 'admin/_admin_nav.html' %}

    <div class="max-w-5xl mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-gray-800">🔐 Gestión de Administradores</h1>
            <button onclick="showCreateModal()" class="px-5 py-2 rounded-lg text-sm font-semibold text-white" style="background:#785631">+ Nuevo Admin</button>
        </div>

        <!-- Solicitudes pendientes de aprobación -->
        <div id="pendingCard" class="bg-white rounded-xl shadow-lg overflow-hidden mb-6 hidden">
            <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
                <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                    ⏳ Solicitudes Pendientes
                    <span id="pendingCount" class="text-xs bg-amber-100 text-amber-800 px-2 py-1 rounded-full font-semibold">0</span>
                </h2>
                <button onclick="loadPendingOperators()" class="text-xs text-gray-500 hover:text-gray-700">↻ Actualizar</button>
            </div>
            <div id="pendingList" class="divide-y">
                <div class="p-8 text-center text-gray-400">Cargando solicitudes...</div>
            </div>
            <div id="pendingPagination" class="px-6 py-3 border-t border-gray-100 bg-gray-50 flex items-center justify-between hidden">
                <button id="pendingPrev" onclick="changePendingPage(-1)" class="text-xs px-3 py-1.5 rounded-lg border border-gray-300 bg-white hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed font-medium text-gray-600" disabled>← Anterior</button>
                <span id="pendingPageInfo" class="text-xs text-gray-500 font-medium"></span>
                <button id="pendingNext" onclick="changePendingPage(1)" class="text-xs px-3 py-1.5 rounded-lg border border-gray-300 bg-white hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed font-medium text-gray-600" disabled>Siguiente →</button>
            </div>
        </div>

        <div id="adminsTable" class="bg-white rounded-xl shadow-lg overflow-hidden">
            <div class="p-8 text-center text-gray-400">Cargando...</div>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6">
            <h2 id="modalTitle" class="text-lg font-bold text-gray-800 mb-4">Nuevo Administrador</h2>
            <form id="adminForm" class="space-y-3">
                <input type="hidden" id="editId">
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-xs text-gray-500">Nombre*</label><input id="fName" required class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                    <div><label class="text-xs text-gray-500">Apellido*</label><input id="lName" required class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                </div>
                <div class="grid grid-cols-2 gap-3">
<div><label class="text-xs text-gray-500">Tipo Documento</label><select id="docType" class="w-full px-3 py-2 border rounded-lg text-sm"><option>CC</option><option>CE</option><option>TI</option><option>PP</option><option>PPT</option></select></div>
                    <div><label class="text-xs text-gray-500">Documento*</label><input id="docNum" required class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                </div>
                <div><label class="text-xs text-gray-500">Email (opcional)</label><input id="email" type="email" class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="correo@ejemplo.com"></div>
                <div><label class="text-xs text-gray-500">Teléfono</label><input id="phone" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                <div><label class="text-xs text-gray-500">Contraseña*</label><input id="password" type="password" required class="w-full px-3 py-2 border rounded-lg text-sm" minlength="8"></div>
<div><label class="text-xs text-gray-500">Rol</label><select id="userType" class="w-full px-3 py-2 border rounded-lg text-sm"><option value="superadmin">Superadmin (acceso total)</option><option value="admin">Admin (gestión operativa)</option><option value="checkin">Check-in (e Indumentaria)</option></select></div>
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="saveAdmin()" class="flex-1 py-2 rounded-lg text-sm font-semibold text-white" style="background:#785631">Guardar</button>
                    <button type="button" onclick="closeModal()" class="flex-1 py-2 rounded-lg text-sm font-semibold bg-gray-200 text-gray-700">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
    (function(){const t=localStorage.getItem('access_token'),u=JSON.parse(localStorage.getItem('user')||'{}');if(!t||u.user_type!=='superadmin'){location.href='/admin/login';return}})();
    function authH(){return{Authorization:'Bearer '+localStorage.getItem('access_token')}}
    function toast(m,t){const c=document.getElementById('toast-container'),e=document.createElement('div');e.className='toast '+(t==='error'?'bg-red-500':t==='success'?'bg-green-500':'bg-blue-500')+' text-white px-6 py-3 rounded-lg shadow-lg';e.textContent=m;c.appendChild(e);setTimeout(()=>e.remove(),4000)}

    async function loadAdmins(){
        const container=document.getElementById('adminsTable');
        try{
            const r=await fetch('/api/auth/admins',{headers:authH()});
            if(!r.ok){container.innerHTML='<p class="p-8 text-center text-red-500">Error al cargar</p>';return}
            const admins=await r.json();
            if(!admins.length){container.innerHTML='<p class="p-8 text-center text-gray-400">No hay administradores</p>';return}
            let h='<table class="w-full"><thead class="bg-gray-50"><tr><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nombre</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Documento</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Rol</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Estado</th><th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase">Acciones</th></tr></thead><tbody class="divide-y">';
            const roleMap={
                superadmin:'<span class="text-xs bg-purple-100 text-purple-800 px-2 py-1 rounded-full font-semibold">Superadmin</span>',
                admin:'<span class="text-xs bg-indigo-100 text-indigo-800 px-2 py-1 rounded-full font-semibold">Admin</span>',
                checkin:'<span class="text-xs bg-green-100 text-green-800 px-2 py-1 rounded-full font-semibold">Check-in</span>',
                intendencia:'<span class="text-xs bg-amber-100 text-amber-800 px-2 py-1 rounded-full font-semibold">Intendencia</span>',
                coordinator:'<span class="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded-full font-semibold">Coordinador</span>'
            };
            admins.forEach(a=>{
                const role=roleMap[a.user_type]||'<span class="text-xs bg-gray-100 text-gray-800 px-2 py-1 rounded-full font-semibold">'+(a.user_type||'Desconocido')+'</span>';
                const status=a.is_active?'<span class="text-xs bg-green-100 text-green-800 px-2 py-1 rounded-full">Activo</span>':'<span class="text-xs bg-red-100 text-red-800 px-2 py-1 rounded-full">Inactivo</span>';
                const me=JSON.parse(localStorage.getItem('user')||'{}');
                const isOtherSuperadmin=a.user_type==='superadmin'&&a.id!==me.id;
                const toggleBtn=isOtherSuperadmin
                    ?''  // Otro superadmin: ocultar botón (no se puede eliminar)
                    :(a.is_active
                        ?`<button onclick="deactivateAdmin('${a.id}')" title="Desactivar" class="bg-red-500 text-white px-3 py-1 rounded text-xs">🚫</button>`
                        :`<button onclick="activateAdmin('${a.id}')" title="Reactivar" class="bg-green-500 text-white px-3 py-1 rounded text-xs">✅</button>`);
                h+=`<tr class="hover:bg-gray-50"><td class="px-4 py-3 text-sm font-medium">${a.first_name} ${a.last_name}</td><td class="px-4 py-3 text-sm text-gray-500">${a.document_number}</td><td class="px-4 py-3">${role}</td><td class="px-4 py-3">${status}</td><td class="px-4 py-3 text-center space-x-2"><button onclick="editAdmin('${a.id}')" class="bg-blue-500 text-white px-3 py-1 rounded text-xs">✏️ Editar</button>${toggleBtn}</td></tr>`;
            });
            h+='</tbody></table>';
            container.innerHTML=h;
        }catch(e){toast('Error','error')}
    }

    function showCreateModal(){
        document.getElementById('modalTitle').textContent='Nuevo Administrador';
        document.getElementById('editId').value='';
        document.getElementById('adminForm').reset();
        document.getElementById('password').required=true;
        document.getElementById('modal').classList.remove('hidden');
    }

    async function editAdmin(id){
        try{
            const r=await fetch('/api/auth/admins',{headers:authH()});const admins=await r.json();
            const a=admins.find(x=>x.id===id);if(!a)return;
            document.getElementById('modalTitle').textContent='Editar Administrador';
            document.getElementById('editId').value=id;
            document.getElementById('fName').value=a.first_name;
            document.getElementById('lName').value=a.last_name;
            document.getElementById('docNum').value=a.document_number;
            document.getElementById('email').value=a.email||'';
            document.getElementById('phone').value=a.phone||'';
            document.getElementById('userType').value=a.user_type;
            document.getElementById('password').value='';
            document.getElementById('password').required=false;
            document.getElementById('modal').classList.remove('hidden');
        }catch(e){toast('Error','error')}
    }

    function closeModal(){document.getElementById('modal').classList.add('hidden')}

    async function saveAdmin(){
        const id=document.getElementById('editId').value;
        const body={first_name:document.getElementById('fName').value,last_name:document.getElementById('lName').value,document_type:document.getElementById('docType').value,document_number:document.getElementById('docNum').value,email:document.getElementById('email').value||undefined,phone:document.getElementById('phone').value||undefined,user_type:document.getElementById('userType').value};
        const pw=document.getElementById('password').value;
        if(pw)body.password=pw;
        try{
            let r;
            if(id){r=await fetch('/api/auth/admins/'+id,{method:'PUT',headers:{...authH(),'Content-Type':'application/json'},body:JSON.stringify(body)})}
            else{if(!pw){toast('La contraseña es requerida','error');return}r=await fetch('/api/auth/admins',{method:'POST',headers:{...authH(),'Content-Type':'application/json'},body:JSON.stringify(body)})}
            if(r.ok||r.status===201){toast(id?'Actualizado':'Creado','success');closeModal();loadAdmins()}
            else{const e=await r.json();toast(e.detail||'Error','error')}
        }catch(e){toast('Error','error')}
    }

    async function deactivateAdmin(id){
        const me=JSON.parse(localStorage.getItem('user')||'{}');
        const isSelf=id===me.id;
        const msg=isSelf
            ?'⚠️ Vas a DESACTIVAR TU PROPIA cuenta. Tras esto no podrás iniciar sesión hasta que otro superadmin te reactive. ¿Confirmar?'
            :'¿Desactivar este administrador? No podrá iniciar sesión hasta que se reactive.';
        if(!confirm(msg))return;
        try{const r=await fetch('/api/auth/admins/'+id,{method:'DELETE',headers:authH()});if(r.ok||r.status===204){toast('Administrador desactivado','success');loadAdmins()}else{const e=await r.json().catch((()=>({})));toast(e.detail||'Error','error')}}catch(e){toast('Error','error')}
    }

    async function activateAdmin(id){
        if(!confirm('¿Reactivar este administrador? Podrá iniciar sesión inmediatamente.'))return;
        try{
            const r=await fetch('/api/auth/admins/'+id,{method:'PUT',headers:{...authH(),'Content-Type':'application/json'},body:JSON.stringify({is_active:true})});
            if(r.ok){toast('Administrador reactivado','success');loadAdmins()}
            else{const e=await r.json();toast(e.detail||'Error','error')}
        }catch(e){toast('Error','error')}
    }

    // ===== SOLICITUDES PENDIENTES (con paginación client-side) =====
    const PENDING_PER_PAGE=5;
    let pendingAllItems=[];
    let pendingCurrentPage=1;

    async function loadPendingOperators(){
        const card=document.getElementById('pendingCard');
        const list=document.getElementById('pendingList');
        const countBadge=document.getElementById('pendingCount');
        try{
            const r=await fetch('/api/operators/pending',{headers:authH()});
            if(!r.ok){card.classList.add('hidden');return}
            const data=await r.json();
            pendingAllItems=data.items||[];
            countBadge.textContent=pendingAllItems.length;
            if(!pendingAllItems.length){card.classList.add('hidden');return}
            card.classList.remove('hidden');
            pendingCurrentPage=1;
            renderPendingPage();
        }catch(e){card.classList.add('hidden')}
    }

    function renderPendingPage(){
        const list=document.getElementById('pendingList');
        const totalPages=Math.ceil(pendingAllItems.length/PENDING_PER_PAGE);
        if(pendingCurrentPage>totalPages)pendingCurrentPage=totalPages;
        if(pendingCurrentPage<1)pendingCurrentPage=1;
        const start=(pendingCurrentPage-1)*PENDING_PER_PAGE;
        const pageItems=pendingAllItems.slice(start,start+PENDING_PER_PAGE);
        let h='';
        pageItems.forEach(op=>{
            const photo=op.photo_thumbnail_path?`<img src="${op.photo_thumbnail_path}" class="w-14 h-14 rounded-full object-cover border">`:'<div class="w-14 h-14 rounded-full bg-gray-200 flex items-center justify-center text-gray-400 text-xl">👤</div>';
            const rut=op.rut_path?`<a href="${op.rut_path}" target="_blank" download class="text-xs bg-red-100 text-red-700 px-2 py-1 rounded font-semibold">📄 Ver RUT</a>`:'<span class="text-xs text-gray-400">Sin RUT</span>';
            h+=`<div class="p-4 flex items-center gap-4">
                ${photo}
                <div class="flex-1 min-w-0">
                    <p class="font-semibold text-gray-800 truncate">${op.full_name}</p>
                    <p class="text-xs text-gray-500">${op.document_type} ${op.document_number} · ${op.email||''}</p>
                    <p class="text-xs text-gray-400">${op.phone||'Sin teléfono'}</p>
                </div>
                <div class="flex flex-col gap-1 items-end">
                    <div class="flex gap-1 mb-1">
                        ${rut}
                        <a href="/admin/operator/${op.user_id}" target="_blank" class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded font-semibold">👁️ Ver detalle</a>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="approveOperator('${op.user_id}')" class="bg-green-500 text-white px-3 py-1 rounded text-xs font-semibold">✅ Aprobar</button>
                        <button onclick="rejectOperator('${op.user_id}')" class="bg-red-500 text-white px-3 py-1 rounded text-xs font-semibold">❌ Rechazar</button>
                    </div>
                </div>
            </div>`;
        });
        list.innerHTML=h;
        // Controles de paginación
        const pager=document.getElementById('pendingPagination');
        const prev=document.getElementById('pendingPrev');
        const next=document.getElementById('pendingNext');
        const info=document.getElementById('pendingPageInfo');
        if(totalPages>1){
            pager.classList.remove('hidden');
            prev.disabled=pendingCurrentPage<=1;
            next.disabled=pendingCurrentPage>=totalPages;
            info.textContent='Página '+pendingCurrentPage+' de '+totalPages+' ('+pendingAllItems.length+' solicitudes)';
        }else{
            pager.classList.add('hidden');
        }
    }

    function changePendingPage(delta){
        pendingCurrentPage+=delta;
        renderPendingPage();
    }

    async function approveOperator(userId){
        if(!confirm('¿Aprobar este operador? Podrá iniciar sesión inmediatamente.'))return;
        try{
            const r=await fetch('/api/operators/'+userId+'/approve',{method:'POST',headers:authH()});
            if(r.ok){toast('Operador aprobado','success');loadPendingOperators()}
            else{const e=await r.json();toast(e.detail||'Error','error')}
        }catch(e){toast('Error','error')}
    }

    async function rejectOperator(userId){
        const reason=prompt('Motivo del rechazo (opcional):','No cumple requisitos');
        if(reason===null)return;
        try{
            const r=await fetch('/api/operators/'+userId+'/reject',{method:'POST',headers:{...authH(),'Content-Type':'application/json'},body:JSON.stringify({reason})});
            if(r.ok){toast('Operador rechazado','success');loadPendingOperators()}
            else{const e=await r.json();toast(e.detail||'Error','error')}
        }catch(e){toast('Error','error')}
    }

    loadAdmins();
    loadPendingOperators();
    </script>
</body>
</html>
