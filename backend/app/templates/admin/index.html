<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/jpeg" href="/static/frontend/logo.jpeg">
    <link rel="apple-touch-icon" href="/static/frontend/logo.jpeg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Logística Admin</title>
    <link rel="stylesheet" href="/static/frontend/tailwind.css?v=20260718">
<style>
        .toast { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .loading { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .role-card { transition: all 0.2s ease; }
        .role-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Toast container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

{% set active_page = 'dashboard' %}
{% include 'admin/_admin_nav.html' %}

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-8">
            <!-- Active Events Card -->
            <div class="bg-white rounded-xl shadow-lg p-8 border-l-4 border-primary-500 flex items-center">
                <div class="flex-shrink-0 bg-primary-50 rounded-xl p-4 mr-6">
                    <svg class="w-12 h-12 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                </div>
                <div>
                    <div class="text-sm text-gray-500 font-medium uppercase tracking-wide">Eventos Activos</div>
                    <div id="statEvents" class="text-4xl font-bold text-gray-800 mt-1">-</div>
                    <div class="text-xs text-gray-400 mt-1">Publicado / En progreso</div>
                </div>
            </div>
            <!-- Total Operators Card -->
            <div class="bg-white rounded-xl shadow-lg p-8 border-l-4 border-green-500 flex items-center">
                <div class="flex-shrink-0 bg-green-50 rounded-xl p-4 mr-6">
                    <svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                    </svg>
                </div>
                <div>
                    <div class="text-sm text-gray-500 font-medium uppercase tracking-wide">Total Operadores</div>
                    <div id="statOperators" class="text-4xl font-bold text-green-600 mt-1">-</div>
                    <div class="text-xs text-gray-400 mt-1">Registrados en el sistema</div>
                </div>
            </div>
        </div>

        <!-- Operators by Role -->
        <div class="mb-4 flex items-center justify-between">
            <h2 class="text-xl font-bold text-gray-800">Operadores por Rol</h2>
            <a href="/admin/operators" class="text-primary-600 hover:text-primary-800 text-sm font-medium">Ver todos los operadores →</a>
        </div>
        <div id="rolesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full p-8 text-center text-gray-400 loading">Cargando...</div>
        </div>

        <!-- Sin experiencia container (filled by JS) -->
        <div id="sinExpWrapper"></div>
    </div>

    <script>
        // Auth check
        (function() {
            const token = localStorage.getItem('access_token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!token || !['superadmin', 'coordinator'].includes(user.user_type)) {
                window.location.href = '/admin/login';
                return;
            }
        })();

        function getAuthHeaders() {
            return { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') };
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bg = type === 'error' ? 'bg-red-500' : type === 'success' ? 'bg-green-500' : 'bg-blue-500';
            toast.className = `toast ${bg} text-white px-6 py-3 rounded-lg shadow-lg`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // --- Pagination state ---
        const MEMBERS_PER_PAGE = 10;
        const rolePages = {};
        let sinExpPage = 0;
        let dashData = null;

        const roleColors = [
            'border-blue-400', 'border-green-400', 'border-purple-400',
            'border-orange-400', 'border-pink-400', 'border-teal-400',
            'border-yellow-400', 'border-indigo-400', 'border-red-400',
            'border-cyan-400',
        ];
        const roleBgColors = [
            'bg-blue-50', 'bg-green-50', 'bg-purple-50',
            'bg-orange-50', 'bg-pink-50', 'bg-teal-50',
            'bg-yellow-50', 'bg-indigo-50', 'bg-red-50',
            'bg-cyan-50',
        ];
        const roleTextColors = [
            'text-blue-700', 'text-green-700', 'text-purple-700',
            'text-orange-700', 'text-pink-700', 'text-teal-700',
            'text-yellow-700', 'text-indigo-700', 'text-red-700',
            'text-cyan-700',
        ];

        function memberLi(member, isMulti) {
            const avatar = member.photo_thumbnail_path
                ? `<img src="${member.photo_thumbnail_path}" class="w-7 h-7 rounded-full object-cover flex-shrink-0 ${isMulti ? 'ring-2 ring-yellow-400' : ''}">`
                : `<div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold text-white flex-shrink-0 ${isMulti ? 'ring-2 ring-yellow-400' : ''}" style="background:${isMulti ? '#eab308' : '#cf9b62'};">${(member.name||'?').charAt(0)}</div>`;
            return `
                <li class="py-2">
                    <div class="flex items-center min-w-0">
                        <div class="mr-3 flex-shrink-0">${avatar}</div>
                        <div class="min-w-0 flex-1">
                            <div class="flex items-center flex-wrap gap-1">
                                <a href="/admin/operator/${member.id}" class="text-sm font-medium text-gray-800 hover:text-primary-600">${member.name}</a>
                                ${isMulti ? '<span class="text-[10px] bg-yellow-100 text-yellow-800 px-1.5 py-0.5 rounded-full font-semibold">MULTI</span>' : ''}
                            </div>
                            <div class="text-xs text-gray-400">${member.city || ''}</div>
                        </div>
                        ${member.phone ? `<a href="tel:${member.phone}" class="text-xs text-primary-600 hover:text-primary-800 flex-shrink-0 ml-2 whitespace-nowrap">${member.phone}</a>` : ''}
                    </div>
                </li>`;
        }

        function paginationControls(total, current, onclickPrev, onclickNext) {
            const totalPages = Math.ceil(total / MEMBERS_PER_PAGE);
            if (totalPages <= 1) return '';
            const start = current * MEMBERS_PER_PAGE + 1;
            const end = Math.min((current + 1) * MEMBERS_PER_PAGE, total);
            let h = `<div class="flex items-center justify-between mt-3 pt-2 border-t border-gray-100">`;
            h += `<span class="text-xs text-gray-400">Mostrando ${start}-${end} de ${total}</span>`;
            h += `<div class="flex gap-1 items-center">`;
            if (current > 0) h += `<button ${onclickPrev} class="px-2 py-1 text-xs rounded bg-gray-100 hover:bg-gray-200 text-gray-600">← Ant</button>`;
            h += `<span class="px-2 py-1 text-xs text-gray-500">${current+1}/${totalPages}</span>`;
            if (current < totalPages-1) h += `<button ${onclickNext} class="px-2 py-1 text-xs rounded bg-gray-100 hover:bg-gray-200 text-gray-600">Sig →</button>`;
            h += `</div></div>`;
            return h;
        }

        function renderRoleMembers(roleId) {
            const role = (dashData.operators_by_role || []).find(r => r.role_id === roleId);
            if (!role) return;
            const page = rolePages[roleId] || 0;
            const members = role.members || [];
            const total = members.length;
            const start = page * MEMBERS_PER_PAGE;
            const pageMembers = members.slice(start, start + MEMBERS_PER_PAGE);

            const memberRoleCount = {};
            (dashData.operators_by_role || []).forEach(r => r.members.forEach(m => { memberRoleCount[m.id] = (memberRoleCount[m.id]||0)+1; }));

            const body = document.getElementById('roleBody-'+roleId);
            if (!body) return;

            let html = '';
            if (total === 0) {
                html = '<p class="text-sm text-gray-400 italic py-2">Sin operadores asignados</p>';
            } else {
                html = '<ul class="divide-y divide-gray-100">';
                pageMembers.forEach(member => {
                    const isMulti = memberRoleCount[member.id] > 1;
                    html += memberLi(member, isMulti);
                });
                html += '</ul>';
                html += paginationControls(total, page,
                    `onclick="goRolePage('${roleId}',${page-1})"`,
                    `onclick="goRolePage('${roleId}',${page+1})"`);
            }
            body.innerHTML = html;
        }

        function goRolePage(roleId, page) {
            rolePages[roleId] = page;
            renderRoleMembers(roleId);
            const el = document.getElementById('roleBody-'+roleId);
            if (el) el.closest('.role-card').scrollIntoView({behavior:'smooth', block:'nearest'});
        }

        function renderSinExp(page) {
            sinExpPage = page;
            const sinExp = dashData.sin_experiencia || [];
            const total = sinExp.length;
            const start = page * MEMBERS_PER_PAGE;
            const pageMembers = sinExp.slice(start, start + MEMBERS_PER_PAGE);

            const wrapper = document.getElementById('sinExpWrapper');
            if (total === 0) { wrapper.innerHTML = ''; return; }

            let html = `
            <div class="mb-4 mt-8 flex items-center justify-between">
                <h2 class="text-xl font-bold text-gray-800">⚠️ Sin Experiencia Asignada</h2>
                <span class="inline-flex items-center justify-center px-3 py-1 rounded-full text-sm font-bold bg-amber-100 text-amber-800">${total}</span>
            </div>
            <div class="bg-white rounded-xl shadow overflow-hidden border-t-4 border-amber-400">
                <div class="px-5 py-4 flex items-center justify-between bg-amber-50">
                    <h3 class="font-bold text-amber-700 text-base">Operadores sin rol asignado</h3>
                </div>
                <div class="px-5 py-3">
                    <ul class="divide-y divide-gray-100">`;
            pageMembers.forEach(member => {
                const sinAvatar = member.photo_thumbnail_path
                    ? `<img src="${member.photo_thumbnail_path}" class="w-7 h-7 rounded-full object-cover flex-shrink-0">`
                    : `<div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold text-white flex-shrink-0" style="background:#9ca3af;">${(member.name||'?').charAt(0)}</div>`;
                html += `
                    <li class="py-2 flex items-center justify-between">
                        <div class="flex items-center min-w-0">
                            <div class="mr-3 flex-shrink-0">${sinAvatar}</div>
                            <div class="min-w-0">
                                <a href="/admin/operator/${member.id}" class="text-sm font-medium text-gray-800 hover:text-primary-600 truncate">${member.name}</a>
                                <div class="text-xs text-gray-400">${member.city || ''}</div>
                            </div>
                        </div>
                        ${member.phone ? `<a href="tel:${member.phone}" class="text-xs text-primary-600 hover:text-primary-800 flex-shrink-0 ml-2">${member.phone}</a>` : ''}
                    </li>`;
            });
            html += `</ul>`;
            html += paginationControls(total, page,
                `onclick="renderSinExp(${page-1})"`,
                `onclick="renderSinExp(${page+1})"`);
            html += `</div></div>`;
            wrapper.innerHTML = html;
        }

        async function loadDashboard() {
            try {
                const response = await fetch('/api/operators/dashboard/stats', {
                    headers: getAuthHeaders()
                });

                if (response.status === 401 || response.status === 403) {
                    localStorage.clear();
                    window.location.href = '/admin/login';
                    return;
                }

                const data = await response.json();
                dashData = data;

                document.getElementById('statEvents').textContent = data.active_events || 0;
                document.getElementById('statOperators').textContent = data.total_operators || 0;

                const container = document.getElementById('rolesContainer');
                const roles = data.operators_by_role || [];

                if (roles.length === 0) {
                    container.innerHTML = '<div class="col-span-full p-8 text-center text-gray-400">No hay roles configurados</div>';
                    return;
                }

                let html = '';
                roles.forEach((role, idx) => {
                    const colorIdx = idx % roleColors.length;
                    const borderColor = roleColors[colorIdx];
                    const bgColor = roleBgColors[colorIdx];
                    const textColor = roleTextColors[colorIdx];

                    html += `
                    <div class="role-card bg-white rounded-xl shadow overflow-hidden border-t-4 ${borderColor}">
                        <div class="px-5 py-4 flex items-center justify-between ${bgColor}">
                            <h3 class="font-bold ${textColor} text-base">${role.role_name}</h3>
                            <span class="inline-flex items-center justify-center w-8 h-8 rounded-full text-sm font-bold text-white" style="background:#785631;">
                                ${role.count}
                            </span>
                        </div>
                        <div id="roleBody-${role.role_id}" class="px-5 py-3">
                            <p class="text-sm text-gray-400 italic py-2">Cargando...</p>
                        </div>
                    </div>`;
                });

                container.innerHTML = html;

                roles.forEach(role => {
                    rolePages[role.role_id] = 0;
                    renderRoleMembers(role.role_id);
                });

                renderSinExp(0);

            } catch (err) {
                console.error('Error loading dashboard:', err);
                showToast('Error al cargar el dashboard', 'error');
            }
        }

        async function adminLogout() {
            try {
                await fetch('/api/auth/me', { headers: getAuthHeaders() });
            } catch(e) {}
            localStorage.clear();
            window.location.href = '/admin/login';
        }

        loadDashboard();
    </script>
</body>
</html>
