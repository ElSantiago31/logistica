<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/jpeg" href="/static/frontend/logo.jpeg">
    <link rel="apple-touch-icon" href="/static/frontend/logo.jpeg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operadores - Logística Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: {
                primary: { 50:'#fff2e4',100:'#ffebd6',200:'#f8d9b6',300:'#e3be95',400:'#d5aa7b',500:'#cf9b62',600:'#b48450',700:'#976e41',800:'#785631',900:'#5d4224' },
            }}}
        }
    </script>
    <style>
        .toast { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .loading { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        /* Mobile cards */
        .op-card { transition: background-color 0.15s; }
        .op-card:active { background-color: #f9fafb; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- Navbar -->
    {% set active_page = 'operators' %}
    {% include 'admin/_admin_nav.html' %}

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Search + Tabs -->
        <div class="bg-white rounded-xl shadow p-4 mb-6">
            <div class="flex flex-wrap gap-4 items-center">
                <div class="flex-1 min-w-[200px]">
                    <input type="text" id="searchInput" placeholder="Buscar por nombre, email o documento..."
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 outline-none"
                        oninput="debounceSearch()">
                </div>
                <div class="flex gap-1 bg-gray-100 rounded-lg p-1">
                    <button onclick="switchTab('active')" id="tabActive" class="px-4 py-1.5 rounded-md text-sm font-medium bg-primary-600 text-white transition">Activos</button>
                    <button onclick="switchTab('inactive')" id="tabInactive" class="px-4 py-1.5 rounded-md text-sm font-medium text-gray-600 hover:bg-gray-200 transition">Inactivos / Bloqueados</button>
                </div>
                <span id="totalCount" class="text-sm text-gray-500"></span>
            </div>
        </div>

        <!-- List container -->
        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
            <div id="operatorsTable" class="overflow-x-auto">
                <div class="p-8 text-center text-gray-400 loading">Cargando operadores...</div>
            </div>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="flex justify-center mt-6 space-x-2"></div>
    </div>

    <script>
        (function() {
            const token = localStorage.getItem('access_token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!token || !['superadmin', 'coordinator'].includes(user.user_type)) {
                window.location.href = '/admin/login'; return;
            }
        })();

        let currentPage = 0;
        const pageSize = 20;
        let searchTimeout;
        let currentTab = 'active';

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabActive').className = tab==='active' ? 'px-4 py-1.5 rounded-md text-sm font-medium bg-primary-600 text-white transition' : 'px-4 py-1.5 rounded-md text-sm font-medium text-gray-600 hover:bg-gray-200 transition';
            document.getElementById('tabInactive').className = tab==='inactive' ? 'px-4 py-1.5 rounded-md text-sm font-medium bg-red-500 text-white transition' : 'px-4 py-1.5 rounded-md text-sm font-medium text-gray-600 hover:bg-gray-200 transition';
            currentPage = 0;
            loadOperators();
        }

        function getAuthHeaders() { return { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }; }

        function showToast(msg, type='info') {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            const bg = type==='error'?'bg-red-500':type==='success'?'bg-green-500':'bg-blue-500';
            t.className = 'toast '+bg+' text-white px-6 py-3 rounded-lg shadow-lg';
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(()=>t.remove(), 4000);
        }

        function debounceSearch() { clearTimeout(searchTimeout); searchTimeout = setTimeout(()=>{ currentPage=0; loadOperators(); }, 300); }

        async function loadOperators() {
            const container = document.getElementById('operatorsTable');
            container.innerHTML = '<div class="p-8 text-center text-gray-400 loading">Cargando...</div>';
            const search = document.getElementById('searchInput').value.trim().toLowerCase();
            const skip = currentPage * pageSize;
            const isActive = currentTab === 'active';
            let url = '/api/operators/?skip='+skip+'&limit='+pageSize+'&is_active='+isActive;
            if (search) url += '&search=' + encodeURIComponent(search);

            try {
                const res = await fetch(url, { headers: getAuthHeaders() });
                if (res.status===401||res.status===403) { localStorage.clear(); window.location.href='/admin/login'; return; }
                const data = await res.json();
                const items = data.items || [];
                document.getElementById('totalCount').textContent = data.total + ' operadores';
                if (!items.length) { container.innerHTML = '<div class="p-8 text-center text-gray-400">No se encontraron operadores</div>'; document.getElementById('pagination').innerHTML=''; return; }

                // Mobile: cards, Desktop: table
                const isMobile = window.innerWidth < 768;

                if (isMobile) {
                    renderCards(container, items);
                } else {
                    renderTable(container, items);
                }

                // Pagination
                const tp = Math.ceil(data.total / pageSize);
                let ph = '';
                if (tp > 1) {
                    if (currentPage > 0) ph += '<button onclick="goPage('+(currentPage-1)+')" class="px-3 py-1 rounded bg-white border hover:bg-gray-50">← Anterior</button>';
                    ph += '<span class="px-3 py-1 text-sm text-gray-600">Página '+(currentPage+1)+' de '+tp+'</span>';
                    if (currentPage < tp-1) ph += '<button onclick="goPage('+(currentPage+1)+')" class="px-3 py-1 rounded bg-white border hover:bg-gray-50">Siguiente →</button>';
                }
                document.getElementById('pagination').innerHTML = ph;
            } catch(e) { console.error(e); }
        }

        function renderCards(container, items) {
            let html = '<div class="divide-y divide-gray-100">';
            items.forEach(op => {
                const name = (op.first_name||'')+' '+(op.last_name||'');
                const avatar = op.photo_thumbnail_path
                    ? '<img src="'+op.photo_thumbnail_path+'" class="w-11 h-11 rounded-full object-cover border-2 border-gray-200">'
                    : '<div class="w-11 h-11 rounded-full bg-primary-200 flex items-center justify-center text-primary-700 font-bold text-sm">'+(op.first_name?op.first_name[0]:'')+(op.last_name?op.last_name[0]:'')+'</div>';
                const statusBadge = op.is_active
                    ? '<span class="inline-block px-2 py-0.5 rounded-full text-xs font-bold bg-green-100 text-green-700">Activo</span>'
                    : '<span class="inline-block px-2 py-0.5 rounded-full text-xs font-bold bg-red-100 text-red-700">Bloqueado</span>';
                const banBadge = op.is_banned ? ' <span class="inline-block px-2 py-0.5 rounded-full text-xs font-bold bg-red-600 text-white">🚫 Vetado</span>' : '';
                const docDisplay = (op.document_type||'')+' '+(op.document_number||'-');
                const blocked = !op.is_active;

                html += '<div class="op-card flex items-center gap-3 px-4 py-3 cursor-pointer '+(blocked?'bg-red-50/50':'')+'" onclick="viewOp(\''+op.id+'\')">';
                html += avatar;
                html += '<div class="flex-1 min-w-0">';
                html += '<div class="flex items-center gap-2 flex-wrap"><span class="text-sm font-semibold text-gray-900 truncate">'+name.trim()+'</span>'+statusBadge+banBadge+'</div>';
                html += '<div class="text-xs text-gray-500 truncate">'+docDisplay+' · '+(op.phone||'-')+' · '+(op.city||'-')+'</div>';
                html += '</div>';
                html += '<svg class="w-5 h-5 text-gray-300 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>';
                html += '</div>';
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function renderTable(container, items) {
            let html = '<table class="w-full"><thead class="bg-gray-50"><tr><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Foto</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nombre</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Documento</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Teléfono</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ciudad</th><th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase">Estado</th><th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase">Acciones</th></tr></thead><tbody class="divide-y divide-gray-200">';
            items.forEach(op => {
                const name = (op.first_name||'')+' '+(op.last_name||'');
                const avatar = op.photo_thumbnail_path ? '<img src="'+op.photo_thumbnail_path+'" class="w-9 h-9 rounded-full object-cover border-2 border-gray-200">' : '<div class="w-9 h-9 rounded-full bg-primary-200 flex items-center justify-center text-primary-700 font-bold text-sm">'+(op.first_name?op.first_name[0]:'')+(op.last_name?op.last_name[0]:'')+'</div>';
                const statusBadge = op.is_active ? '<span class="inline-block px-2 py-0.5 rounded-full text-xs font-bold bg-green-100 text-green-700">Activo</span>' : '<span class="inline-block px-2 py-0.5 rounded-full text-xs font-bold bg-red-100 text-red-700">Bloqueado</span>';
                const banBadge = op.is_banned ? '<br><span class="inline-block px-2 py-0.5 rounded-full text-xs font-bold bg-red-600 text-white">🚫 Vetado</span>' : '';
                const docDisplay = (op.document_type||'')+' '+(op.document_number||'-');
                html += '<tr id="row-'+op.id+'" class="hover:bg-gray-50 '+(op.is_active?'':'bg-red-50/50')+'"><td class="px-4 py-3">'+avatar+'</td><td class="px-4 py-3 text-sm font-medium text-gray-900">'+name.trim()+'</td><td class="px-4 py-3 text-sm text-gray-500">'+docDisplay+'</td><td class="px-4 py-3 text-sm text-gray-500">'+(op.phone||'-')+'</td><td class="px-4 py-3 text-sm text-gray-500">'+(op.city||'-')+'</td><td class="px-4 py-3 text-center">'+statusBadge+banBadge+'</td><td class="px-4 py-3 text-center space-x-1"><button onclick="viewOp(\''+op.id+'\')" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded text-xs transition">👁 Ver</button>'+(op.is_active ? '<button onclick="deleteOp(\''+op.id+'\',\''+name.trim().replace(/'/g,"\\'")+'\')" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-xs transition">🗑</button>' : '')+'</td></tr>';
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // Re-render on resize
        let resizeTimeout;
        window.addEventListener('resize', () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(loadOperators, 250); });

        function goPage(p) { currentPage = p; loadOperators(); }
        function viewOp(id) { window.location.href = '/admin/operator/'+id; }

        async function deleteOp(id, name) {
            if (!confirm('¿Eliminar al operador "'+name+'"?\n\nEsta acción desactivará su cuenta.')) return;
            try {
                const r = await fetch('/api/operators/'+id, { method: 'DELETE', headers: getAuthHeaders() });
                if (r.ok || r.status === 204) {
                    showToast('Operador eliminado', 'success');
                    const row = document.getElementById('row-'+id);
                    if (row) { row.style.opacity = '0.4'; row.style.pointerEvents = 'none'; }
                } else {
                    showToast('Error al eliminar', 'error');
                }
            } catch(e) { showToast('Error de conexión', 'error'); }
        }

        async function adminLogout() { localStorage.clear(); window.location.href = '/admin/login'; }

        loadOperators();
    </script>
</body>
</html>
