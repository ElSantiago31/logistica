<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Evento - Logística Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#fff2e4',100:'#ffebd6',200:'#f8d9b6',300:'#e3be95',400:'#d5aa7b',500:'#cf9b62',600:'#b48450',700:'#976e41',800:'#785631',900:'#5d4224'}}}}}</script>
</head>
<body class="bg-gray-50 min-h-screen">
{% set active_page = 'events' %}
{% include 'admin/_admin_nav.html' %}

    <div class="max-w-3xl mx-auto px-4 py-6">
        <div class="flex items-center gap-3 mb-6">
            <a href="/admin/events" class="text-gray-600 hover:text-gray-900 text-sm">← Eventos</a>
            <h1 class="text-xl font-bold text-gray-800">Crear Evento</h1>
        </div>
        <form id="eventForm" class="space-y-6">
            <div class="bg-white rounded-lg shadow p-6 space-y-4">
                <h2 class="text-lg font-semibold text-gray-800">Información del Evento</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre del Evento *</label>
                        <input type="text" id="name" required class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Ubicación *</label>
                        <input type="text" id="location" required class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Ciudad</label>
                        <input type="text" id="city" class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Fecha Inicio *</label>
                        <input type="datetime-local" id="start_date" required class="w-full border rounded-lg px-3 py-2" onchange="updateEndDateMin()">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Fecha Fin *</label>
                        <input type="datetime-local" id="end_date" required class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Cliente</label>
                        <input type="text" id="client_name" class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono Cliente</label>
                        <input type="text" id="client_phone" class="w-full border rounded-lg px-3 py-2">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
                    <textarea id="description" rows="3" class="w-full border rounded-lg px-3 py-2"></textarea>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-6 space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-semibold text-gray-800">Personal Requerido</h2>
                    <button type="button" onclick="addStaffRow()" class="text-blue-600 hover:text-blue-800 text-sm font-medium">+ Agregar rol</button>
                </div>
                <div id="staffRows" class="space-y-3"></div>
            </div>
            <div id="toast" class="hidden fixed bottom-4 right-4 px-4 py-2 rounded-lg text-white"></div>
            <div class="flex justify-end gap-3">
                <a href="/admin/events" class="px-4 py-2 border rounded-lg hover:bg-gray-50">Cancelar</a>
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">Crear Evento</button>
            </div>
        </form>
    </div>

<script>
(function(){
    const t=localStorage.getItem('access_token'),u=JSON.parse(localStorage.getItem('user')||'{}');
    if(!t||!['superadmin','coordinator'].includes(u.user_type)){location.href='/admin/login';return}
        if(u.user_type==='superadmin'){}
})();
function getToken(){return localStorage.getItem('access_token');}
function updateEndDateMin(){
    const sd=document.getElementById('start_date').value;
    if(sd) document.getElementById('end_date').min=sd;
}
let roles=[];
async function loadRoles(){
    const token=getToken();
    const res=await fetch('/api/catalogs/roles',{headers:{'Authorization':'Bearer '+token}});
    const data=await res.json();
    roles=data.items||data;
    addStaffRow();
}
function addStaffRow(){
    const div=document.getElementById('staffRows');
    const opts=roles.map(r=>`<option value="${r.id}">${r.name}</option>`).join('');
    const row=document.createElement('div');
    row.className='flex gap-3 items-center';
    row.innerHTML=`
        <select class="staff-role border rounded-lg px-3 py-2 flex-1"><option value="">Seleccionar rol</option>${opts}</select>
        <input type="number" class="staff-qty border rounded-lg px-3 py-2 w-24" min="1" value="1" placeholder="Cant.">
        <input type="number" class="staff-rate border rounded-lg px-3 py-2 w-32" step="1" placeholder="Costo/turno $">
        <button type="button" onclick="this.parentElement.remove()" class="text-red-500 hover:text-red-700">✕</button>`;
    div.appendChild(row);
}
document.getElementById('eventForm').addEventListener('submit',async(e)=>{
    e.preventDefault();
    const sd=document.getElementById('start_date').value;
    const ed=document.getElementById('end_date').value;
    if(sd&&ed&&ed<sd){showToast('La fecha de fin debe ser posterior a la fecha de inicio','bg-red-500');return;}
    const token=getToken();
    const staffNeeds=[];
    document.querySelectorAll('#staffRows > div').forEach(row=>{
        const roleId=row.querySelector('.staff-role').value;
        const qty=parseInt(row.querySelector('.staff-qty').value)||0;
        const rate=parseFloat(row.querySelector('.staff-rate').value)||null;
        if(roleId&&qty>0) staffNeeds.push({role_id:roleId,quantity_needed:qty,rate_per_shift:rate});
    });
    const body={
        name:document.getElementById('name').value,
        description:document.getElementById('description').value||null,
        location:document.getElementById('location').value,
        city:document.getElementById('city').value||null,
        start_date:document.getElementById('start_date').value,
        end_date:document.getElementById('end_date').value,
        client_name:document.getElementById('client_name').value||null,
        client_phone:document.getElementById('client_phone').value||null,
        staff_needs:staffNeeds
    };
    try{
        const res=await fetch('/api/events/',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(body)});
        if(res.ok){const ev=await res.json();window.location.href='/admin/events/'+ev.id;}
        else{const err=await res.json();showToast(err.detail||'Error al crear evento','bg-red-500');}
    }catch(e){showToast('Error de conexión','bg-red-500');}
});
function showToast(msg,cls){
    const t=document.getElementById('toast');
    t.textContent=msg;t.className=`fixed bottom-4 right-4 px-4 py-2 rounded-lg text-white ${cls}`;
    setTimeout(()=>t.className='hidden',3000);
}
loadRoles();
</script>
</body>
</html>
