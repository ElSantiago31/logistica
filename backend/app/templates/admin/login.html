<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Logística</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50:'#fff2e4', 100:'#ffebd6', 200:'#f8d9b6', 300:'#e3be95',
                            400:'#d5aa7b', 500:'#cf9b62', 600:'#b48450',
                            700:'#976e41', 800:'#785631', 900:'#5d4224'
                        },
                    }
                }
            }
        }
    </script>
    <style>
        .toast { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        body { background: linear-gradient(135deg, #5d4224 0%, #976e41 50%, #cf9b62 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <!-- Toast container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <div class="max-w-md w-full mx-4">
        <div class="bg-white rounded-2xl shadow-2xl p-8 border border-primary-100">
            <!-- Logo -->
            <div class="text-center mb-8">
                <img src="/static/frontend/logo.jpeg" alt="A&C Logística" class="w-24 h-24 rounded-full object-cover mx-auto mb-3 shadow-lg border-4" style="border-color:#cf9b62;">
                <h1 class="text-2xl font-bold" style="color:#785631;">A&amp;C Logística</h1>
                <p class="text-gray-500 mt-1 text-sm">Panel de Administración</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Número de Documento</label>
                    <input type="text" id="document_number" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition"
                        placeholder="Ej: 1234567890">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <input type="password" id="password" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition"
                        placeholder="••••••••">
                </div>
                <button type="submit" id="submitBtn"
                    class="w-full text-white py-3 rounded-lg font-semibold transition duration-200 flex items-center justify-center hover:opacity-90" style="background: linear-gradient(135deg, #785631, #cf9b62);">
                    <span id="btnText">Iniciar Sesión</span>
                    <svg id="btnSpinner" class="hidden animate-spin h-5 w-5 ml-2 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>

            <!-- Links -->
            <div class="text-center mt-6 pt-6 border-t border-gray-200 space-y-3">
                <a href="/" class="inline-flex items-center gap-2 text-sm text-primary-600 hover:text-primary-800 font-medium">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    Ir al inicio
                </a>
                <a href="/enrolamiento/forgot-password" class="text-sm text-primary-600 hover:text-primary-800 font-medium">¿Olvidaste tu contraseña?</a>
                <p class="text-sm text-gray-500">¿Eres operador?</p>
                <a href="/enrolamiento" class="text-sm text-primary-600 hover:text-primary-800 font-medium">Regístrate aquí</a>
            </div>
        </div>
    </div>

    <script>
        // Check if already logged in
        (function() {
            const token = localStorage.getItem('access_token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (token && ['superadmin', 'coordinator'].includes(user.user_type)) {
                window.location.href = '/admin';
            }
        })();

        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bg = type === 'error' ? 'bg-red-500' : type === 'success' ? 'bg-green-500' : 'bg-blue-500';
            toast.className = `toast ${bg} text-white px-6 py-3 rounded-lg shadow-lg`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        async function handleLogin(e) {
            e.preventDefault();
            const document_number = document.getElementById('document_number').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('btnSpinner');

            btn.disabled = true;
            btnText.textContent = 'Ingresando...';
            spinner.classList.remove('hidden');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ document_number, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showToast('¡Bienvenido!', 'success');
                    setTimeout(() => { window.location.href = '/admin'; }, 500);
                } else {
                    showToast(data.detail || 'Error al iniciar sesión', 'error');
                }
            } catch (err) {
                showToast('Error de conexión', 'error');
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Iniciar Sesión';
                spinner.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
