{% set active_page = 'events' %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Evento - Logística Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#fff2e4',100:'#ffebd6',200:'#f8d9b6',300:'#e3be95',400:'#d5aa7b',500:'#cf9b62',600:'#b48450',700:'#976e41',800:'#785631',900:'#5d4224'}}}}}</script>
</head>
<body class="bg-gray-50 min-h-screen">
    {% include 'admin/_admin_nav.html' %}

    <div class="max-w-7xl mx-auto px-3 sm:px-4 py-4 sm:py-6 space-y-4 sm:space-y-6">
        <!-- Event Info Card -->
        <div class="bg-white rounded-lg shadow p-4 sm:p-6">
            <div class="flex flex-col sm:flex-row justify-between items-start gap-3 mb-4">
                <div class="min-w-0">
                    <h2 class="text-xl sm:text-2xl font-bold text-gray-900 truncate" id="evName"></h2>
                    <p class="text-gray-500 mt-1 text-sm" id="evClient"></p>
                </div>
                <div class="flex flex-wrap gap-2 items-center">
                    <span id="evStatusBadge" class="px-3 py-1 rounded-full text-xs sm:text-sm font-medium"></span>
                    <div id="evActions" class="flex flex-wrap gap-2"></div>
                </div>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 sm:gap-4 text-sm" id="evDetails"></div>
        </div>

        <!-- Staff Needs -->
        <div class="bg-white rounded-lg shadow p-4 sm:p-6">
            <h3 class="text-base sm:text-lg font-semibold text-gray-800 mb-4">Personal Requerido</h3>
            <div class="overflow-x-auto -mx-4 sm:mx-0">
                <div id="staffNeedsTable" class="min-w-full px-4 sm:px-0"></div>
            </div>
        </div>

        <!-- Assignments -->
        <div class="bg-white rounded-lg shadow p-4 sm:p-6">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
                <h3 class="text-base sm:text-lg font-semibold text-gray-800">Asignaciones</h3>
                <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                    <button onclick="showAssignModal()" class="bg-green-600 text-white px-3 sm:px-4 py-2 rounded-lg hover:bg-green-700 text-xs sm:text-sm flex-1 sm:flex-none text-center">+ Asignar</button>
                    <button onclick="sendInvitations()" class="bg-emerald-600 text-white px-3 sm:px-4 py-2 rounded-lg hover:bg-emerald-700 text-xs sm:text-sm flex-1 sm:flex-none text-center">📱 Invitar WA</button>
                    <a href="/admin/events/{{ event_id }}/checkin" class="bg-purple-600 text-white px-3 sm:px-4 py-2 rounded-lg hover:bg-purple-700 text-xs sm:text-sm flex-1 sm:flex-none text-center block">📷 Check-in</a>
                    <a href="/admin/events/{{ event_id }}/payroll" class="bg-amber-600 text-white px-3 sm:px-4 py-2 rounded-lg hover:bg-amber-700 text-xs sm:text-sm flex-1 sm:flex-none text-center block">💰 Nómina</a>
                </div>
            </div>
            <div class="overflow-x-auto -mx-4 sm:mx-0">
                <div id="assignmentsTable" class="min-w-full px-4 sm:px-0"></div>
            </div>
        </div>

        <!-- Audit Log -->
        <div class="bg-white rounded-lg shadow p-4 sm:p-6">
            <h3 class="text-base sm:text-lg font-semibold text-gray-800 mb-4">📋 Historial de Cambios</h3>
            <div id="auditLogContent" class="space-y-3">
                <p class="text-gray-400 text-sm">Cargando...</p>
            </div>
        </div>
    </div>

    <!-- Assign Modal (Smart Assignment) -->
    <div id="assignModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-end sm:items-center justify-center z-50">
        <div class="bg-white rounded-t-lg sm:rounded-lg p-4 sm:p-6 w-full sm:max-w-2xl max-h-[85vh] sm:max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-base sm:text-lg font-semibold">🎯 Asignación Inteligente</h3>
                <button onclick="closeAssignModal()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
            </div>
            <!-- Staff need chips for quick filter -->
            <div id="smartChips" class="flex flex-wrap gap-2 mb-3"></div>
            <div class="space-y-2 mb-4">
                <input type="text" id="searchOps" placeholder="🔍 Buscar por nombre, email, documento..." class="w-full border rounded-lg px-4 py-2.5 text-sm" oninput="debounceSearch()">
                <div class="flex flex-col sm:flex-row gap-2">
                    <select id="assignRole" class="flex-1 border rounded-lg px-3 py-2 text-sm"></select>
                    <label id="cityFilterWrap" class="flex items-center gap-2 border rounded-lg px-3 py-2 text-sm bg-gray-50 cursor-pointer whitespace-nowrap sm:max-w-[50%]">
                        <input type="checkbox" id="cityFilter" onchange="searchOperators(true)" class="rounded">
                        <span class="text-gray-700 truncate" id="cityFilterLabel">📍 Solo mi ciudad</span>
                    </label>
                </div>
            </div>
            <div id="opsResults" class="space-y-2 max-h-60 overflow-y-auto"></div>
            <div class="mt-4 flex justify-between items-center">
                <span id="selectionCounter" class="text-sm text-gray-500"></span>
                <div class="flex gap-2">
                    <button onclick="closeAssignModal()" class="px-4 py-2 border rounded-lg text-sm">Cancelar</button>
                    <button id="btnAssign" onclick="assignSelected()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm">Asignar</button>
                </div>
            </div>
        </div>
    </div>
    <div id="toast" class="hidden fixed bottom-4 right-4 left-4 sm:left-auto px-4 py-2 rounded-lg text-white z-50 text-center sm:text-left text-sm"></div>

<script>
(function(){
    const t=localStorage.getItem('access_token'),u=JSON.parse(localStorage.getItem('user')||'{}');
    if(!t||!['superadmin','coordinator'].includes(u.user_type)){location.href='/admin/login';return}
})();
const EVENT_ID='{{ event_id }}';
function getToken(){return localStorage.getItem('access_token');}
let selectedOps=new Set(),assignedOps=new Set(),currentStaffNeeds=[],roles=[],currentEventCity='';
let opsPage=0,opsTotal=0,opsPageSize=20,opsLoading=false,searchTimer=null;

async function loadEvent(){
    const token=getToken();if(!token){window.location.href='/admin/login';return}
    const res=await fetch(`/api/events/${EVENT_ID}`,{headers:{'Authorization':'Bearer '+token}});
    if(!res.ok){showToast('Error cargando evento','bg-red-500');return}
    const ev=await res.json();
    document.getElementById('evName').textContent=ev.name;
    document.getElementById('evClient').textContent=ev.client_name?`Cliente: ${ev.client_name}`:'';
    const SL={draft:'Borrador',published:'Publicado',in_progress:'En Progreso',completed:'Completado',cancelled:'Cancelado'};
    const SC={draft:'bg-gray-100 text-gray-800',published:'bg-blue-100 text-blue-800',in_progress:'bg-yellow-100 text-yellow-800',completed:'bg-green-100 text-green-800',cancelled:'bg-red-100 text-red-800'};
    document.getElementById('evStatusBadge').textContent=SL[ev.status]||ev.status;
    document.getElementById('evStatusBadge').className=`px-3 py-1 rounded-full text-xs sm:text-sm font-medium ${SC[ev.status]||'bg-gray-100'}`;
    // Check if event dates have arrived
    const startDate=new Date(ev.start_date);
    const endDate=new Date(ev.end_date);
    const now=new Date();
    const canStart=startDate<=now;
    const canComplete=endDate<=now;

    let actions='';
    if(ev.status==='draft'){
        actions+=`<a href="/admin/events/${EVENT_ID}/edit" class="bg-gray-600 text-white px-3 sm:px-4 py-2 rounded-lg hover:bg-gray-700 text-xs sm:text-sm">✏️ Editar</a>`;
        actions+=`<button onclick="changeEventStatus('published')" class="bg-blue-600 text-white px-3 sm:px-4 py-2 rounded-lg hover:bg-blue-700 text-xs sm:text-sm">📢 Publicar</button>`;
        actions+=`<button onclick="changeEventStatus('cancelled')" class="bg-red-600 text-white px-3 sm:px-4 py-2 rounded-lg hover:bg-red-700 text-xs sm:text-sm">Cancelar</button>`;
    }
    else if(ev.status==='published'){
        actions+=`<a href="/admin/events/${EVENT_ID}/edit" class="bg-gray-600 text-white px-3 sm:px-4 py-2 rounded-lg hover:bg-gray-700 text-xs sm:text-sm">✏️ Editar</a>`;
        if(canStart){
            actions+=`<button onclick="changeEventStatus('in_progress')" class="bg-yellow-500 text-white px-3 sm:px-4 py-2 rounded-lg hover:bg-yellow-600 text-xs sm:text-sm">▶ Iniciar</button>`;
        } else {
            actions+=`<span class="text-xs text-gray-500 italic">⏰ Podrá iniciar el ${startDate.toLocaleDateString('es-CO',{day:'numeric',month:'long',year:'numeric'})}</span>`;
        }
        actions+=`<button onclick="changeEventStatus('cancelled')" class="bg-red-600 text-white px-3 sm:px-4 py-2 rounded-lg hover:bg-red-700 text-xs sm:text-sm">Cancelar</button>`;
    }
    else if(ev.status==='in_progress'){
        actions+=`<button onclick="changeEventStatus('completed')" class="bg-green-600 text-white px-3 sm:px-4 py-2 rounded-lg hover:bg-green-700 text-xs sm:text-sm">✓ Completar</button>`;
    }
    // completed: no actions
    document.getElementById('evActions').innerHTML=actions;
    const sd=new Date(ev.start_date).toLocaleDateString('es-CO'),ed=new Date(ev.end_date).toLocaleDateString('es-CO');
    document.getElementById('evDetails').innerHTML=`<div><span class="text-gray-500">Ubicación</span><div class="font-medium">${ev.city||ev.location}</div></div><div><span class="text-gray-500">Fecha Inicio</span><div class="font-medium">${sd}</div></div><div><span class="text-gray-500">Fecha Fin</span><div class="font-medium">${ed}</div></div><div><span class="text-gray-500">Personal</span><div class="font-medium">${ev.total_confirmed}/${ev.total_staff_needed}</div></div>`;
    currentEventCity=ev.city||'';
    renderStaffNeeds(ev.staff_needs||[]);loadAssignments();loadRoles();
}

const EDU_LABELS={primaria:'Primaria',secundaria:'Secundaria',tecnico:'Técnico',tecnologo:'Tecnólogo',universitario:'Universitario',postgrado:'Postgrado'};
function renderStaffNeeds(needs){
    currentStaffNeeds=needs;const div=document.getElementById('staffNeedsTable');
    if(!needs.length){div.innerHTML='<p class="text-gray-500 text-sm">No se han definido necesidades de personal</p>';return}
    div.innerHTML=`
    <div class="hidden sm:block">
        <table class="w-full text-sm"><thead class="bg-gray-50"><tr><th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Rol</th><th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Necesarios</th><th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Confirmados</th><th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Costo/turno</th><th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Educación min.</th></tr></thead><tbody class="divide-y">${needs.map(n=>`<tr><td class="px-4 py-2 font-medium">${n.role_name||'Sin rol'}</td><td class="px-4 py-2">${n.quantity_needed}</td><td class="px-4 py-2">${n.quantity_confirmed}</td><td class="px-4 py-2">${n.rate_per_shift?'$'+n.rate_per_shift.toLocaleString('es-CO'):'-'}</td><td class="px-4 py-2">${n.education_level?EDU_LABELS[n.education_level]||n.education_level:'<span class="text-gray-400">-</span>'}</td></tr>`).join('')}</tbody></table>
    </div>
    <div class="sm:hidden space-y-2">
        ${needs.map(n=>{const pct=n.quantity_needed?Math.round(n.quantity_confirmed/n.quantity_needed*100):0;return`<div class="border rounded-lg p-3">
            <div class="flex justify-between items-center mb-1"><span class="font-medium text-sm">${n.role_name||'Sin rol'}</span><span class="text-xs text-gray-500">${n.rate_per_shift?'$'+n.rate_per_shift.toLocaleString('es-CO'):'-'}</span></div>
            <div class="flex items-center justify-between"><span class="text-xs text-gray-600">${n.quantity_confirmed}/${n.quantity_needed}</span><div class="w-16 bg-gray-200 rounded-full h-1.5"><div class="bg-blue-600 h-1.5 rounded-full" style="width:${pct}%"></div></div></div>
            ${n.education_level?`<div class="text-xs text-blue-600 mt-1">🎓 ${EDU_LABELS[n.education_level]||n.education_level}</div>`:''}
        </div>`}).join('')}
    </div>`;
}

async function loadAssignments(){
    const token=getToken();const res=await fetch(`/api/events/${EVENT_ID}/assignments`,{headers:{'Authorization':'Bearer '+token}});const assignments=await res.json();
    const div=document.getElementById('assignmentsTable');
    assignedOps.clear();
    if(!assignments.length){div.innerHTML='<p class="text-gray-500 text-sm">No hay operadores asignados</p>';return}
    const SL={invited:'Invitado',confirmed:'Confirmado',rejected:'Rechazado',standby:'En espera',no_show:'No asistió',checked_in:'Check-in',sin_acreditacion:'Sin Acreditación'};
    const SC={invited:'bg-yellow-100 text-yellow-800',confirmed:'bg-green-100 text-green-800',rejected:'bg-red-100 text-red-800',standby:'bg-gray-100 text-gray-800',no_show:'bg-red-100 text-red-800',checked_in:'bg-blue-100 text-blue-800',sin_acreditacion:'bg-amber-100 text-amber-800'};
    // Populate assignedOps with user_id (matching what /api/operators/ returns as id)
    assignments.forEach(a=>{if(a.operator_user_id)assignedOps.add(String(a.operator_user_id))});

    div.innerHTML=`
    <div class="hidden sm:block">
        <table class="w-full text-sm">
            <thead class="bg-gray-50"><tr>
                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Operador</th>
                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Teléfono</th>
                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Rol</th>
                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Estado</th>
                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Costo/turno</th>
                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Acciones</th>
            </tr></thead>
            <tbody class="divide-y">${assignments.map(a=>`<tr>
                <td class="px-4 py-2 font-medium">${a.operator_name}</td>
                <td class="px-4 py-2 text-sm">${a.operator_phone||'-'}</td>
                <td class="px-4 py-2 text-sm">${a.role_name||'-'}</td>
                <td class="px-4 py-2"><span class="px-2 py-1 rounded-full text-xs font-medium ${SC[a.status]||'bg-gray-100'}">${SL[a.status]||a.status}</span></td>
                <td class="px-4 py-2 text-sm">${a.rate_applied?'$'+a.rate_applied.toLocaleString('es-CO'):'-'}</td>
                <td class="px-4 py-2"><select onchange="changeAssignmentStatus('${a.id}',this.value)" class="text-xs border rounded px-2 py-1 bg-white"><option value="">Cambiar...</option><option value="confirmed" ${a.status==='confirmed'?'disabled':''}>✅ Confirmar</option><option value="rejected" ${a.status==='rejected'?'disabled':''}>❌ Rechazar</option><option value="standby" ${a.status==='standby'?'disabled':''}>⏳ En espera</option><option value="no_show" ${a.status==='no_show'?'disabled':''}>🚫 No asistió</option><option value="sin_acreditacion" ${a.status==='sin_acreditacion'?'disabled':''}>⚠️ Sin Acreditación</option><option value="invited" ${a.status==='invited'?'disabled':''}>📩 Invitado</option><option value="remove" class="text-red-600 font-medium">🗑️ Eliminar</option></select></td>
            </tr>`).join('')}</tbody>
        </table>
    </div>
    <div class="sm:hidden space-y-3">
        ${assignments.map(a=>`<div class="border rounded-lg p-3 space-y-2">
            <div class="flex justify-between items-start">
                <div><div class="font-medium text-sm">${a.operator_name}</div><div class="text-xs text-gray-500">${a.operator_phone||'-'}</div></div>
                <span class="px-2 py-1 rounded-full text-xs font-medium ${SC[a.status]||'bg-gray-100'}">${SL[a.status]||a.status}</span>
            </div>
            <div class="flex justify-between text-xs text-gray-600"><span>Rol: ${a.role_name||'-'}</span><span>${a.rate_applied?'$'+a.rate_applied.toLocaleString('es-CO'):'-'}</span></div>
            <select onchange="changeAssignmentStatus('${a.id}',this.value)" class="w-full text-xs border rounded px-2 py-1.5 bg-white"><option value="">Cambiar estado...</option><option value="confirmed" ${a.status==='confirmed'?'disabled':''}>✅ Confirmar</option><option value="rejected" ${a.status==='rejected'?'disabled':''}>❌ Rechazar</option><option value="standby" ${a.status==='standby'?'disabled':''}>⏳ En espera</option><option value="no_show" ${a.status==='no_show'?'disabled':''}>🚫 No asistió</option><option value="sin_acreditacion" ${a.status==='sin_acreditacion'?'disabled':''}>⚠️ Sin Acreditación</option><option value="invited" ${a.status==='invited'?'disabled':''}>📩 Invitado</option><option value="remove" class="text-red-600 font-medium">🗑️ Eliminar</option></select>
        </div>`).join('')}
    </div>`;
}

const STATUS_CONFIRM={published:{msg:'¿Publicar/reabrir este evento?',toast:'Evento publicado',color:'bg-blue-500'},in_progress:{msg:'¿Iniciar este evento?',toast:'Evento en progreso',color:'bg-yellow-500'},completed:{msg:'¿Marcar como completado?',toast:'Evento completado',color:'bg-green-500'},cancelled:{msg:'¿Cancelar este evento?',toast:'Evento cancelado',color:'bg-red-500'}};
async function changeEventStatus(ns){const cfg=STATUS_CONFIRM[ns];if(cfg&&!confirm(cfg.msg))return;const token=getToken();const res=await fetch(`/api/events/${EVENT_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({status:ns})});if(res.ok){showToast(cfg?.toast||'Actualizado',cfg?.color||'bg-green-500');loadEvent()}else showToast('Error','bg-red-500')}

async function loadRoles(){
    const token=getToken();const res=await fetch('/api/catalogs/roles?include_event_only=true',{headers:{'Authorization':'Bearer '+token}});const data=await res.json();roles=data.items||data;
    const sel=document.getElementById('assignRole');sel.innerHTML='<option value="">Sin rol específico</option>'+roles.map(r=>{const need=currentStaffNeeds.find(n=>n.role_id===r.id);const rs=need&&need.rate_per_shift?` ($${need.rate_per_shift.toLocaleString('es-CO')})`:'';return`<option value="${r.id}">${r.name}${rs}</option>`}).join('');
}

let _smartFilter = { role: '', edu: '' };  // Filtro inteligente (chips) en memoria

function showAssignModal(){
    selectedOps.clear();opsPage=0;opsTotal=0;
    document.getElementById('searchOps').value='';
    _smartFilter = { role: '', edu: '' };
    // Configurar el checkbox de filtro por ciudad (desactivado por defecto)
    const cityCb=document.getElementById('cityFilter');
    const cityLabel=document.getElementById('cityFilterLabel');
    const cityWrap=document.getElementById('cityFilterWrap');
    if(cityCb&&cityLabel&&cityWrap){
        cityCb.checked=false;  // Desactivado por defecto: muestra TODOS los operadores
        if(currentEventCity){
            cityLabel.textContent='📍 Solo '+currentEventCity;
            cityWrap.classList.remove('hidden');
        }else{
            cityWrap.classList.add('hidden');  // Ocultar si el evento no tiene ciudad
        }
    }
    const chips=document.getElementById('smartChips');
    if(currentStaffNeeds.length){
        chips.innerHTML=currentStaffNeeds.map(n=>{
            const missing=n.quantity_needed-n.quantity_confirmed;
            if(missing<=0)return'';
            const label=`${n.role_name||'Rol'}: faltan ${missing}${n.education_level?' (🎓 '+(EDU_LABELS[n.education_level]||n.education_level)+')':''}`;
            return`<button type="button" onclick="applySmartFilter('${n.role_id||''}','${n.education_level||''}')" class="inline-flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-medium bg-blue-50 text-blue-700 hover:bg-blue-100 border border-blue-200 transition">🎯 ${label}</button>`;
        }).join('');
    }else{chips.innerHTML=''}
    document.getElementById('assignModal').classList.remove('hidden');
    document.getElementById('opsResults').innerHTML='<p class="text-gray-400 text-sm text-center py-4">Cargando operadores...</p>';
    searchOperators(true);
}
function applySmartFilter(roleId,edu){
    _smartFilter.role = roleId;
    _smartFilter.edu = edu;
    document.getElementById('assignRole').value = roleId;
    searchOperators(true);
}
function closeAssignModal(){document.getElementById('assignModal').classList.add('hidden')}

function debounceSearch(){clearTimeout(searchTimer);searchTimer=setTimeout(()=>searchOperators(true),300)}

async function searchOperators(resetPage=false){
    if(opsLoading)return;
    if(resetPage)opsPage=0;
    opsLoading=true;
    const token=getToken();const q=document.getElementById('searchOps').value;
    const roleId=_smartFilter.role;
    // Solo filtrar por ciudad si el usuario activó el checkbox (desactivado por defecto)
    const cityCb=document.getElementById('cityFilter');
    const city=(cityCb&&cityCb.checked)?currentEventCity:'';
    const edu=_smartFilter.edu;
    const skip=opsPage*opsPageSize;
    let url=`/api/operators/?skip=${skip}&limit=${opsPageSize}&is_approved=true&exclude_event_id=${encodeURIComponent(EVENT_ID)}`;
    if(q.length>=2)url+=`&search=${encodeURIComponent(q)}`;
    if(roleId)url+=`&experience_role_id=${encodeURIComponent(roleId)}`;
    if(city)url+=`&city=${encodeURIComponent(city)}`;
    if(edu)url+=`&education_level=${encodeURIComponent(edu)}`;
    console.log('[searchOperators]',url);
    try{
        const res=await fetch(url,{headers:{'Authorization':'Bearer '+token}});
        if(!res.ok){const err=await res.text();console.error('API error:',res.status,err);throw new Error('API '+res.status)}
        const data=await res.json();
        opsTotal=data.total||0;
        console.log('[searchOperators] total:',opsTotal,'items:',(data.items||[]).length);
        const items=data.items||[];
        if(resetPage||opsPage===0){
            renderOpsFirstPage(items);
        }else{
            appendOpsResults(items);
        }
    }catch(e){console.error('[searchOperators] error:',e);document.getElementById('opsResults').innerHTML='<p class="text-red-500 text-sm">Error: '+e.message+'</p>'}
    finally{opsLoading=false}
}

function renderOpsFirstPage(ops){
    const div=document.getElementById('opsResults');
    if(!ops.length){div.innerHTML='<p class="text-gray-500 text-sm text-center py-4">No hay operadores disponibles con estos filtros</p>';return}
    const shown=(opsPage+1)*opsPageSize;const hasMore=shown<opsTotal;
    let html=`<div class="text-xs text-gray-400 mb-2">Mostrando ${Math.min(shown,opsTotal)} de ${opsTotal} operadores</div>`;
    html+=ops.map(o=>opRow(o)).join('');
    if(hasMore)html+=`<button onclick="loadMoreOps()" class="w-full py-2 text-sm text-blue-600 hover:text-blue-800 hover:bg-blue-50 rounded border border-dashed border-blue-300 mt-1">Cargar más (${opsTotal-shown} restantes)</button>`;
    div.innerHTML=html;
}

function appendOpsResults(ops){
    const div=document.getElementById('opsResults');
    const btn=div.querySelector('button[onclick="loadMoreOps()"]');
    if(btn)btn.remove();
    div.insertAdjacentHTML('beforeend',ops.map(o=>opRow(o)).join());
    const shown=(opsPage+1)*opsPageSize;const hasMore=shown<opsTotal;
    if(hasMore)div.insertAdjacentHTML('beforeend',`<button onclick="loadMoreOps()" class="w-full py-2 text-sm text-blue-600 hover:text-blue-800 hover:bg-blue-50 rounded border border-dashed border-blue-300 mt-1">Cargar más (${opsTotal-shown} restantes)</button>`);
}

function opRow(o){
    const checked=selectedOps.has(String(o.id))?'checked':'';
    const eduBadge=o.education_level?`<span class="text-xs bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded">🎓 ${EDU_LABELS[o.education_level]||o.education_level}</span>`:'';
    return`<label class="flex items-center gap-2 p-2 hover:bg-gray-50 rounded cursor-pointer flex-wrap"><input type="checkbox" value="${o.id}" onchange="toggleOp(this)" class="rounded flex-shrink-0" ${checked}><span class="font-medium text-sm">${o.first_name} ${o.last_name}</span><span class="text-xs text-gray-500">${o.phone||''}</span><span class="text-xs text-gray-400">${o.city||''}</span>${eduBadge}</label>`;
}

function loadMoreOps(){opsPage++;searchOperators(false)}

function getMaxForRole(){
    const roleId=document.getElementById('assignRole').value;
    if(!roleId)return 999;
    const need=currentStaffNeeds.find(n=>n.role_id===roleId);
    if(!need)return 999;
    return Math.max(0,need.quantity_needed-need.quantity_confirmed);
}

function toggleOp(cb){
    const max=getMaxForRole();
    if(cb.checked){
        if(selectedOps.size>=max){cb.checked=false;showToast('Máximo '+max+' operador(es) para este rol','bg-yellow-500');return}
        selectedOps.add(cb.value);
    }else{selectedOps.delete(cb.value)}
    updateSelectionCounter();
}

function updateSelectionCounter(){
    const max=getMaxForRole();const count=selectedOps.size;
    const counter=document.getElementById('selectionCounter');
    const btn=document.getElementById('btnAssign');
    if(max<999){counter.textContent=count+' de '+max+' seleccionados';counter.className=count>max?'text-sm text-red-500 font-medium':'text-sm text-gray-500'}
    else{counter.textContent=count+' seleccionados';counter.className='text-sm text-gray-500'}
    btn.disabled=count===0||count>max;
    btn.className=count===0||count>max?'bg-gray-300 text-white px-4 py-2 rounded-lg text-sm cursor-not-allowed':'bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm';
}

async function assignSelected(){if(!selectedOps.size){showToast('Selecciona al menos uno','bg-yellow-500');return}const token=getToken();const roleId=document.getElementById('assignRole').value||null;const body={operator_ids:Array.from(selectedOps),role_id:roleId};const res=await fetch(`/api/events/${EVENT_ID}/assign`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(body)});if(res.ok){showToast('Asignados','bg-green-500');closeAssignModal();loadEvent()}else{const d=await res.json().catch(({})=>({}));showToast(d.detail||'Error','bg-red-500')}}

function showToast(msg,cls){const t=document.getElementById('toast');t.textContent=msg;t.className=`fixed bottom-4 right-4 left-4 sm:left-auto px-4 py-2 rounded-lg text-white z-50 text-center sm:text-left text-sm ${cls}`;setTimeout(()=>t.className='hidden',3000)}
async function sendInvitations(){const token=getToken();if(!confirm('¿Encolar invitaciones WhatsApp?'))return;const res=await fetch(`/api/whatsapp/events/${EVENT_ID}/invite`,{method:'POST',headers:{'Authorization':'Bearer '+token}});const data=await res.json();showToast(data.message||'Error',res.ok?'bg-green-500':'bg-red-500')}

async function changeAssignmentStatus(assignmentId,newStatus){if(!newStatus)return;if(newStatus==='remove'){removeAssignment(assignmentId);return}const token=getToken();const SL={confirmed:'Confirmado',rejected:'Rechazado',standby:'En espera',no_show:'No asistió',invited:'Invitado',sin_acreditacion:'Sin Acreditación'};if(!confirm(`¿Cambiar estado a "${SL[newStatus]||newStatus}"?`))return;const res=await fetch(`/api/whatsapp/assignments/${assignmentId}/status?new_status=${newStatus}`,{method:'PATCH',headers:{'Authorization':'Bearer '+token}});if(res.ok){showToast(`Estado cambiado a ${SL[newStatus]}`,'bg-green-500');loadEvent()}else{const data=await res.json().catch(()=>({}));showToast(data.detail||'Error al cambiar estado','bg-red-500')}}

async function removeAssignment(assignmentId){if(!confirm('¿ELIMINAR esta asignación?\n\nEl operador será quitado de la lista de asignados de este evento.\nEsta acción no se puede deshacer.'))return;const token=getToken();const res=await fetch(`/api/events/assignments/${assignmentId}`,{method:'DELETE',headers:{'Authorization':'Bearer '+token}});if(res.ok){showToast('Operador desasignado del evento','bg-green-500');loadEvent()}else{const data=await res.json().catch(()=>({}));showToast(data.detail||'Error al eliminar','bg-red-500')}}

async function loadAuditLogs(){
    const token=getToken();
    try{
        const res=await fetch(`/api/events/${EVENT_ID}/audit-logs`,{headers:{'Authorization':'Bearer '+token}});
        if(!res.ok){document.getElementById('auditLogContent').innerHTML='<p class="text-gray-400 text-sm">Sin historial</p>';return}
        const logs=await res.json();
        if(!logs.length){document.getElementById('auditLogContent').innerHTML='<p class="text-gray-400 text-sm">No hay cambios registrados</p>';return}
        const ACTION_LABELS={created:'🆕 Evento creado',updated:'✏️ Evento actualizado',status_changed:'🔄 Estado cambiado',staff_updated:'👥 Personal actualizado',deleted:'🗑️ Evento eliminado'};
        const FIELD_LABELS={name:'Nombre',location:'Ubicación',address:'Dirección',city:'Ciudad',start_date:'Fecha inicio',end_date:'Fecha fin',client_name:'Cliente',client_phone:'Teléfono cliente',description:'Descripción',notes:'Notas',status:'Estado',staff_needs:'Personal requerido'};
        document.getElementById('auditLogContent').innerHTML=logs.map(log=>{
            const date=new Date(log.created_at);
            const timeStr=date.toLocaleString('es-CO',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
            let detail='';
            if(log.changes&&typeof log.changes==='object'){
                const parts=[];
                for(const[key,val]of Object.entries(log.changes)){
                    if(key==='staff_needs'){
                        const antes=val.antes||[];
                        const despues=val.despues||[];
                        // Build a map by role_name for comparison
                        const antesMap={};antes.forEach(s=>{antesMap[s.role_name||s.role_id]={qty:s.qty,rate:s.rate,edu:s.education_level}});
                        const despuesMap={};despues.forEach(s=>{despuesMap[s.role_name||s.role_id]={qty:s.qty,rate:s.rate,edu:s.education_level}});
                        const allRoles=new Set([...Object.keys(antesMap),...Object.keys(despuesMap)]);
                        const EDU={primaria:'Primaria',secundaria:'Secundaria',tecnico:'Técnico',tecnologo:'Tecnólogo',universitario:'Universitario',postgrado:'Postgrado'};
                        for(const roleN of allRoles){
                            const a=antesMap[roleN];
                            const d=despuesMap[roleN];
                            if(!a&&d){parts.push(`<span class="text-xs text-green-600">+ ${roleN}: ${d.qty} persona(s)${d.rate?' ($'+Number(d.rate).toLocaleString('es-CO')+')':''}${d.edu?' 🎓 '+(EDU[d.edu]||d.edu):''}</span>`)}
                            else if(a&&!d){parts.push(`<span class="text-xs text-red-500">- ${roleN}: eliminado (era ${a.qty})</span>`)}
                            else if(a&&d&&(a.qty!==d.qty||String(a.rate)!==String(d.rate)||String(a.edu)!==String(d.edu))){
                                const changes=[];
                                if(a.qty!==d.qty)changes.push(`cant: ${a.qty} → ${d.qty}`);
                                if(String(a.rate)!==String(d.rate))changes.push(`tarifa: ${a.rate||'-'} → ${d.rate||'-'}`);
                                if(String(a.edu)!==String(d.edu))changes.push(`educación: ${a.edu?(EDU[a.edu]||a.edu):'-'} → ${d.edu?(EDU[d.edu]||d.edu):'-'}`);
                                parts.push(`<span class="text-xs"><strong>${roleN}:</strong> ${changes.join(', ')}</span>`);
                            }
                        }
                    } else {
                        const label=FIELD_LABELS[key]||key;
                        if(val&&typeof val==='object'&&val.antes!==undefined){
                            parts.push(`<span class="text-xs"><strong>${label}:</strong> <span class="text-red-400 line-through">${val.antes||'vacío'}</span> → <span class="text-green-600">${val.despues||'vacío'}</span></span>`);
                        } else {
                            parts.push(`<span class="text-xs"><strong>${label}:</strong> ${val}</span>`);
                        }
                    }
                }
                detail=`<div class="ml-5 mt-1 space-y-1">${parts.join('<br>')}</div>`;
            }
            return`<div class="border-l-4 border-primary-300 pl-3 py-1">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-1">
                    <span class="text-sm font-medium text-gray-700">${ACTION_LABELS[log.action]||log.action}</span>
                    <div class="flex items-center gap-2 text-xs text-gray-400">
                        <span>👤 ${log.user_name}</span>
                        <span>📅 ${timeStr}</span>
                    </div>
                </div>
                ${detail}
            </div>`;
        }).join('');
    }catch(e){document.getElementById('auditLogContent').innerHTML='<p class="text-red-400 text-sm">Error cargando historial</p>'}
}

loadEvent();loadAuditLogs();
</script>
