version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: logistica_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: logistica_backend
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    volumes:
      - photo_data:/app/data/photos
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: logistica_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - photo_data:/app/data/photos:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

  certbot:
    build:
      context: ./certbot
      dockerfile: Dockerfile
    image: logistica-certbot-cloudflare:latest
    container_name: logistica_certbot
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    # Auto-renew using DNS-01 (Cloudflare). The cloudflare.ini must exist at /etc/letsencrypt/cloudflare.ini
    # Fallback to HTTP-01 if credentials file is not present (first deploy).
    entrypoint: >
      /bin/sh -c '
      trap exit TERM;
      while :; do
        if [ -f /etc/letsencrypt/cloudflare.ini ]; then
          certbot renew --dns-cloudflare --dns-cloudflare-credentials /etc/letsencrypt/cloudflare.ini --dns-cloudflare-propagation-seconds 30 --quiet;
        else
          certbot renew --quiet;
        fi;
        sleep 12h & wait $${!};
      done;
      '
    networks:
      - internal

volumes:
  postgres_data:
  photo_data:

networks:
  internal: